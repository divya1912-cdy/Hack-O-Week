<!DOCTYPE html>
<html>
<head>
<title>InkAura Stationery</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ffecd2, #fcb69f);
}

/* Header */
header {
    text-align: center;
    padding: 35px 20px;
    font-size: 44px;
    font-weight: 600;
    letter-spacing: 4px;
    background: rgba(255, 255, 255, 0.4);
    backdrop-filter: blur(12px);
    color: #3d3d3d;
}

/* Cart */
.cart {
    position: fixed;
    top: 25px;
    right: 35px;
    background: rgba(255,255,255,0.6);
    padding: 10px 18px;
    border-radius: 30px;
}

/* Grid */
.container {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 40px;
    padding: 60px 80px;
}

/* Cards */
.card {
    background: rgba(255,255,255,0.8);
    border-radius: 25px;
    padding: 25px;
    text-align: center;
    box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    transition: 0.4s;
}

.card:hover {
    transform: translateY(-10px);
}

svg {
    width: 150px;
    height: 150px;
}

.product-name {
    font-size: 20px;
    font-weight: 600;
}

.price {
    color: #666;
}

button {
    padding: 8px 18px;
    border: none;
    border-radius: 25px;
    background: linear-gradient(45deg,#a18cd1,#fbc2eb);
    cursor: pointer;
}

footer {
    text-align: center;
    padding: 25px;
}
</style>
</head>

<body>

<header>𝓘𝓷𝓴𝓐𝓾𝓻𝓪 ✦</header>

<div class="cart">
🛒 Cart: <span id="cartCount">0</span>
</div>

<div class="container">

<!-- Notebook -->
<div class="card">
<svg viewBox="0 0 200 200">
<rect x="45" y="20" width="110" height="160" rx="18" fill="#ff7675"/>
</svg>
<div class="product-name">Hardcover Notebook</div>
<div class="price">₹120</div>
<button onclick="addToCart()">Add to Cart</button>
</div>

<!-- Pen -->
<div class="card">
<svg viewBox="0 0 200 200">
<rect x="40" y="95" width="110" height="12" fill="#0984e3"/>
</svg>
<div class="product-name">Premium Ball Pen</div>
<div class="price">₹50</div>
<button onclick="addToCart()">Add to Cart</button>
</div>

<!-- Sticky Notes -->
<div class="card">
<svg viewBox="0 0 200 200">
<rect x="50" y="50" width="100" height="100" fill="#ffeaa7"/>
</svg>
<div class="product-name">Sticky Notes Pad</div>
<div class="price">₹80</div>
<button onclick="addToCart()">Add to Cart</button>
</div>

<!-- Highlighter -->
<div class="card">
<svg viewBox="0 0 200 200">
<rect x="40" y="90" width="120" height="25" fill="#00cec9"/>
</svg>
<div class="product-name">Neon Highlighter</div>
<div class="price">₹110</div>
<button onclick="addToCart()">Add to Cart</button>
</div>

<!-- Pencil Box -->
<div class="card">
<svg viewBox="0 0 200 200">
<rect x="35" y="75" width="130" height="60" fill="#6c5ce7"/>
</svg>
<div class="product-name">Zipper Pencil Box</div>
<div class="price">₹140</div>
<button onclick="addToCart()">Add to Cart</button>
</div>

<!-- Eraser -->
<div class="card">
<svg viewBox="0 0 200 200">
<rect x="60" y="80" width="80" height="45" fill="#ff7675"/>
</svg>
<div class="product-name">Soft Eraser</div>
<div class="price">₹20</div>
<button onclick="addToCart()">Add to Cart</button>
</div>

</div>

<footer>
©️ 2026 InkAura Stationery | Hacko Week Project
</footer>

<script>
let count = 0;
function addToCart(){
count++;
document.getElementById("cartCount").innerText=count;
}
</script>

</body>
</html>
